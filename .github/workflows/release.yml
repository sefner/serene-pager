# Builds the Windows installer and publishes it as a GitHub release whenever a
# version tag (v0.2.0, v1.0.0, ...) is pushed. Installed stations at the office
# pick the release up automatically — see "Shipping an update" in README.md.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # to upload release assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
